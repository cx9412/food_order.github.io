<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="wechat-text-size-adjust" content="100%"/>
    <title>泡泡老师专属菜单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .dish-card {
            transition: background-color 0.2s;
        }
        .dish-card:active {
            background-color: #f0f0f0;
        }
        /* 主食说明样式（无勾选框） */
        .food-tip {
            color: #6b7280;
            font-size: 0.875rem;
            padding: 1rem;
            background-color: #f9fafb;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
        }
        * {
            -webkit-tap-highlight-color: transparent;
            tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="py-4 px-3">
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-4 mb-4">
    <h1 class="text-xl font-bold text-center text-gray-800 mb-4">🍽️ 泡泡老师专属菜单</h1>
    
    <form id="orderForm" class="space-y-4">
        <div class="border-b pb-2">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">🥢 菜品选择</h2>
            <div class="space-y-3">

                <!-- 主食说明（移到最顶部） -->
                <div class="food-tip">
                    📌 主食默认米饭，其他需求请在备注栏说明
                </div>

                <!-- 原有菜品 -->
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">香煎牛排</span>
                    <input type="checkbox" name="dish_1" value="香煎牛排" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">香煎鸡排</span>
                    <input type="checkbox" name="dish_2" value="香煎鸡排" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">空气炸锅烤肠</span>
                    <input type="checkbox" name="dish_3" value="空气炸锅烤肠" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">小酥肉</span>
                    <input type="checkbox" name="dish_4" value="小酥肉" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">青椒炒牛肉</span>
                    <input type="checkbox" name="dish_5" value="青椒炒牛肉" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">鸡蛋饼</span>
                    <input type="checkbox" name="dish_6" value="鸡蛋饼" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">煎鸡蛋</span>
                    <input type="checkbox" name="dish_7" value="煎鸡蛋" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">炒土豆丝</span>
                    <input type="checkbox" name="dish_8" value="炒土豆丝" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">番茄炒鸡蛋</span>
                    <input type="checkbox" name="dish_9" value="番茄炒鸡蛋" class="w-5 h-5 accent-green-600">
                </div>

                <!-- 新增菜品 -->
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">韭菜鸡蛋</span>
                    <input type="checkbox" name="dish_10" value="韭菜鸡蛋" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">蒜苔腊肉</span>
                    <input type="checkbox" name="dish_11" value="蒜苔腊肉" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">青菜炒香菇</span>
                    <input type="checkbox" name="dish_12" value="青菜炒香菇" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">清炒油麦菜</span>
                    <input type="checkbox" name="dish_13" value="清炒油麦菜" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">芹菜炒香干</span>
                    <input type="checkbox" name="dish_14" value="芹菜炒香干" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">青蒜炒鸡蛋</span>
                    <input type="checkbox" name="dish_15" value="青蒜炒鸡蛋" class="w-5 h-5 accent-green-600">
                </div>
                <div class="dish-card bg-gray-50 p-3 rounded-md flex items-center justify-between">
                    <span class="font-medium">炒娃娃菜</span>
                    <input type="checkbox" name="dish_16" value="炒娃娃菜" class="w-5 h-5 accent-green-600">
                </div>

            </div>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">📝 备注（忌口/要求）</label>
            <textarea id="remark" rows="2" placeholder="比如：少辣、不要葱蒜、几分熟、更换主食等"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500"></textarea>
        </div>

        <button type="submit" 
            class="w-full bg-green-600 text-white py-2 rounded-md font-medium hover:bg-green-700 active:bg-green-800">
            提交订单 <i class="fa fa-paper-plane-o"></i>
        </button>
    </form>
</div>

<div id="successAlert" class="max-w-md mx-auto bg-green-50 border border-green-200 text-green-800 p-4 rounded-lg shadow-md text-center hidden">
    <i class="fa fa-check-circle text-2xl mb-2"></i>
    <p>✅ 订单提交成功！</p>
    <p class="text-sm mt-1">我们会尽快确认菜品~</p>
</div>

<script>
    document.getElementById('orderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const selectedDishes = [];
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(checkbox => {
            selectedDishes.push(checkbox.value);
        });

        if (selectedDishes.length === 0) {
            alert('请至少选择一道菜品~');
            return;
        }

        const formData = {
            submit_time: new Date().toLocaleString(),
            remark: document.getElementById('remark').value,
            selected_dishes: selectedDishes.join('、')
        };

        try {
            const response = await fetch('https://sheetdb.io/api/v1/6mb2am1zm83im', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: formData })
            });

            if (response.ok) {
                document.getElementById('orderForm').classList.add('hidden');
                document.getElementById('successAlert').classList.remove('hidden');
            } else {
                alert('提交失败，请重试~');
            }
        } catch (error) {
            console.error('提交错误：', error);
            alert('网络异常，请稍后再试~');
        }
    });
</script>
</body>
</html>
